name: polkadot-parachain
title: Polkadot Parachain
base: core24
adopt-info: polkadot-parachain
summary: Polkadot - A multi-chain framework for better blockchain interoperability
license: GPL-3.0-with-GCC-exception
contact: info@dwellir.com
issues: https://github.com/dwellir-public/snap-polkadot-parachain/issues
source-code: https://github.com/dwellir-public/snap-polkadot-parachain/
website: https://www.dwellir.com
grade: stable
confinement: strict


platforms:
  amd64:

description: |
  Polkadot is a multi-chain framework that enables interoperability and scalability for multiple blockchains.
  See: https://github.com/paritytech/polkadot-sdk
  
  Hardware requirements can be found here: https://wiki.polkadot.network/docs/maintain-guides-how-to-validate-polkadot#standard-hardware

  Start the service with 'sudo snap start polkadot-parachain'

  Check logs from the Polkadot parachain service with 'snap logs polkadot-parachain -f'

  Supported configuration options for the snap:
  
  service-args [default=--base-path=$SNAP_COMMON/polkadot_base]
  For available arguments see https://github.com/paritytech/polkadot-sdk
  The value set here will be passed to the Polkadot parachain binary with a few exceptions listed below. 
  * If --base-path is not supplied, the snap prepends `--base-path=$SNAP_COMMON/polkadot_base`.
  * A custom --base-path is allowed only under `$SNAP_COMMON` or removable-media paths.

  endure [default=false]
  If true the Polkadot parachain service will not be restarted after a snap refresh.
  Changes to service-args take effect on the next service start or manual restart.

  Use this when restarts should be avoided e.g. when running a validator.

  Example config for running on Asset Hub Polkadot with an RPC endpoint on port 9933:

  sudo snap set polkadot-parachain service-args="--name=foobar --chain=polkadot-assethub --rpc-port=9933"

parts:
  polkadot-parachain:
    plugin: rust
    rust-channel: "1.88.0"
    source: https://github.com/paritytech/polkadot-sdk.git
    source-tag: polkadot-stable2603-2
    source-depth: 1
    build-packages:
      - build-essential
      - libssl-dev
      - git 
      - clang
      - llvm-dev
      - libclang-dev 
      - pkg-config
      - protobuf-compiler
    override-pull: |
      rustup install 1.88.0
      rustup default 1.88.0
      rustup update nightly
      rustup component add rust-src --toolchain 1.88.0
      rustup target add wasm32-unknown-unknown --toolchain 1.88.0
      rustup target add wasm32-unknown-unknown --toolchain nightly
      rustup target add wasm32v1-none --toolchain 1.88.0
      rustup target add wasm32v1-none --toolchain 1.88.0-x86_64-unknown-linux-gnu
      craftctl default
      craftctl set version="polkadot-stable2603-2-$(git rev-parse --short HEAD)"
    override-build: |
      cargo build --release
      install -D target/release/polkadot-parachain $SNAPCRAFT_PART_INSTALL/bin/polkadot-parachain
    prime:
      - bin/polkadot-parachain

  wrappers:
    plugin: dump
    source-type: local
    source: .
    stage:
      - wrappers/
  
  utils:
      plugin: dump
      source-type: local
      source: .
      stage:
        - utils/

# Declare a slot for the polkadot cli binary (use then in apps)
slots:
  bins:
    interface: content
    content: executables
    source:
      read: 
        - $SNAP/bin

apps:
  polkadot-parachain:
    command: wrappers/start-polkadot.bash
    daemon: simple
    install-mode: disable
    refresh-mode: endure
    restart-condition: on-failure
    plugs:
      - network
      - network-bind
      - removable-media
      - system-observe
      - hardware-observe
    environment:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8

  cli:
    command: bin/polkadot-parachain
    plugs:
      - network
      - home
    slots:
      - bins
    environment:
      LC_ALL: C.UTF-8
      LANG: C.UTF-8
